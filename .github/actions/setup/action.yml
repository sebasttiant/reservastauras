name: Setup
description: Install pnpm, Node, and project dependencies with cache.

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.19.0
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@v5
      with:
        node-version-file: package.json
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
