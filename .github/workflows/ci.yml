name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancela corridas anteriores en el mismo ref para no quemar minutos cuando
# se pushean varios commits seguidos. Crítico en repos privados.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Permisos por defecto: mínimos. Cada job que necesite más los pide explícito.
permissions:
  contents: read

env:
  # El job `test` levanta un servicio Postgres en localhost:5432.
  # Para los demás jobs el valor es un placeholder — Prisma generate y Next
  # build no abren conexión, sólo necesitan que la variable exista.
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
  SESSION_SECRET: ci-placeholder-session-secret-32-chars-minimum

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm db:generate
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm db:generate
      # Valida que las migraciones aplican limpias sobre una DB virgen.
      # Si una migración rompe, esto explota antes de mergear.
      - run: pnpm db:migrate
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm db:generate
      - run: pnpm build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm audit --audit-level=high

  trivy-fs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          version: v0.70.0

      - name: Trivy filesystem scan
        run: >-
          trivy fs .
          --format sarif
          --output trivy-fs.sarif
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --ignorefile .trivyignore
          --exit-code 1

      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: reservastauras:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          version: v0.70.0

      - name: Trivy image scan
        run: >-
          trivy image reservastauras:ci
          --format sarif
          --output trivy-image.sarif
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --ignorefile .trivyignore
          --exit-code 1

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
