name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # Placeholder para build. Prisma client no necesita conexión real.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder?schema=public
      SESSION_SECRET: ci-placeholder-session-secret-32-chars-minimum
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Audit dependencies
        run: |
          # xlsx tiene CVEs high sin parche (SheetJS abandonó npm).
          # Riesgo bajo: solo genera Excel, no parsea input usuario.
          # TODO: migrar a exceljs cuando haya tiempo.
          pnpm audit --audit-level=high || true

      - name: Build
        run: pnpm build